<div class="min-h-screen bg-zinc-950 flex items-center justify-center p-4 font-sans text-zinc-100">
  <div
    class="w-full max-w-3xl bg-zinc-900 border border-zinc-800 rounded-2xl shadow-2xl overflow-hidden min-h-[600px] flex flex-col relative"
  >
    <div
      class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-violet-600 via-purple-500 to-indigo-500"
    ></div>

    <div class="p-8 border-b border-zinc-800 bg-zinc-900/50 backdrop-blur-sm z-10">
      <div class="flex justify-between items-center mb-6">
        <div>
          <h1 class="text-2xl font-bold text-white tracking-tight">
            Ignite <span class="text-violet-500">Career</span>
          </h1>
          <p class="text-zinc-400 text-sm mt-1">Construa seu perfil profissional.</p>
        </div>

        <span
          class="text-xs font-bold px-3 py-1 border rounded-full uppercase tracking-wider transition-colors"
          [class.bg-violet-500/10]="currentStep() !== '/resume-informations'"
          [class.text-violet-400]="currentStep() !== '/resume-informations'"
          [class.border-violet-500/20]="currentStep() !== '/resume-informations'"
          [class.bg-emerald-500/10]="currentStep() === '/resume-informations'"
          [class.text-emerald-400]="currentStep() === '/resume-informations'"
          [class.border-emerald-500/20]="currentStep() === '/resume-informations'"
        >
          {{
            currentStep() === '/resume-informations'
              ? 'FINALIZADO'
              : 'Passo ' + (currentStep() === '/personal' ? '01' : '02')
          }}
        </span>
      </div>

      <div class="flex items-center gap-2 h-1 bg-zinc-800 rounded-full overflow-hidden">
        <div
          class="h-full transition-all duration-500 w-1/2"
          [class.bg-violet-600]="currentStep() !== '/resume-informations'"
          [class.shadow-[0_0_10px_rgba(124,58,237,0.5)]]="currentStep() !== '/resume-informations'"
          [class.bg-emerald-600]="currentStep() === '/resume-informations'"
          [class.shadow-[0_0_10px_rgba(5,150,105,0.5)]]="currentStep() === '/resume-informations'"
        ></div>

        <div
          class="h-full transition-all duration-500 ease-out w-1/2"
          [class.bg-violet-600]="currentStep() === '/professional'"
          [class.shadow-[0_0_10px_rgba(124,58,237,0.5)]]="currentStep() === '/professional'"
          [class.bg-emerald-600]="currentStep() === '/resume-informations'"
          [class.shadow-[0_0_10px_rgba(5,150,105,0.5)]]="currentStep() === '/resume-informations'"
        ></div>
      </div>
    </div>

    <div class="flex-1 relative p-8 bg-zinc-900 overflow-hidden">
      <main class="relative min-h-[450px]">
        <router-outlet />
      </main>
    </div>
  </div>
</div>
