<form [formArray]="_curriculumFormStore.professionalFormArray" class="space-y-6">
  <div class="flex justify-between items-end pb-2">
    <label class="block text-sm font-medium text-zinc-300" for="professional-history">Histórico Profissional</label>

    <button (click)="addExperience()"
      class="text-xs font-bold text-violet-400 hover:text-violet-300 flex items-center gap-1 transition-colors uppercase tracking-wider border border-violet-500/30 px-3 py-1.5 rounded hover:bg-violet-500/10 hover:border-violet-500 cursor-pointer">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
      Adicionar Nova
    </button>
  </div>

  <div class="space-y-4 min-h-75">
    @for (item of _curriculumFormStore.professionalFormArray.controls; track item) {
    <div [formGroupName]="$index"
      class="group bg-zinc-950 border border-zinc-800 rounded-xl p-6 relative animate-fade-in hover:border-zinc-700 transition-colors">
      <button (click)="removeExperience($index)"
        class="absolute top-4 right-4 text-zinc-600 hover:text-red-400 p-2 rounded transition-colors cursor-pointer"
        title="Remover Experiência">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 6 6 18" />
          <path d="m6 6 12 12" />
        </svg>
      </button>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="col-span-1 md:col-span-2">
          <label class="text-xs text-zinc-500 mb-1 block uppercase" for="position-{{$index}}">Cargo</label>
          <input type="text" id="position-{{$index}}" placeholder="Ex: Engenheiro de Software"
            class="w-full bg-zinc-900 border border-zinc-800 rounded-lg px-4 py-2 text-zinc-200 focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500 transition-colors font-medium"
            formControlName="position" />
        </div>

        <div class="col-span-1 md:col-span-2">
          <label class="text-xs text-zinc-500 mb-1 block uppercase" for="company-{{$index}}">Empresa</label>
          <input type="text" id="company-{{$index}}" placeholder="Ex: Rocketseat"
            class="w-full bg-zinc-900 border border-zinc-800 rounded-lg px-4 py-2 text-zinc-200 focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500 transition-colors font-medium"
            formControlName="company" />
        </div>

        <div class="col-span-1 md:col-span-2">
          <label class="text-xs text-zinc-500 mb-1 block uppercase" for="description-{{$index}}">Descrição das
            atividades</label>
          <textarea id="description-{{$index}}" rows="3" placeholder="Conte um pouco sobre suas responsabilidades..."
            class="w-full bg-zinc-900 border border-zinc-800 rounded-lg px-4 py-2 text-zinc-200 focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500 transition-colors resize-none"
            formControlName="description"></textarea>
        </div>
      </div>
    </div>
    } @empty {
    <div
      class="flex flex-col items-center justify-center py-12 border-2 border-dashed border-zinc-800 rounded-xl bg-zinc-950/50">
      <div class="bg-zinc-900 p-3 rounded-full mb-3">
        <svg class="text-zinc-600" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" />
          <polyline points="14 2 14 8 20 8" />
        </svg>
      </div>
      <p class="text-zinc-500 text-sm">Nenhuma experiência registrada.</p>
      <button (click)="addExperience()"
        class="mt-2 text-violet-400 text-sm font-semibold hover:text-violet-300 hover:underline">
        Adicionar agora
      </button>
    </div>
    }
  </div>

  <div class="flex justify-between pt-6 border-t border-zinc-800 mt-6">
    <button routerLink="/personal"
      class="text-zinc-400 hover:text-white px-6 py-3 rounded-lg font-medium transition-colors flex items-center gap-2 cursor-pointer">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m15 18-6-6 6-6" />
      </svg>
      Voltar
    </button>

    <button (click)="submit()"
      class="bg-emerald-600 hover:bg-emerald-500 text-white px-8 py-3 rounded-lg font-bold text-sm tracking-wide transition-all flex items-center gap-2 shadow-lg shadow-emerald-600/20 hover:shadow-emerald-600/40 cursor-pointer">
      ENVIAR CURRÍCULO
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
        <path d="m22 4-12 12-4-4" />
      </svg>
    </button>
  </div>
</form>
