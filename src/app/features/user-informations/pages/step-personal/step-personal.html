<form class="space-y-6" [formGroup]="_curriculumFormStore.personalFormGroup" (ngSubmit)="goToProfessional()">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div class="col-span-1 md:col-span-2">
      <label class="block text-sm font-medium text-zinc-300 mb-2" for="name">Nome Completo</label>
      <input type="text" placeholder="Seu nome aqui" formControlName="name" appInputValidation
        errorMessage="O campo Nome é obrigatório"
        class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-3 text-zinc-200 placeholder-zinc-600 focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500 transition-colors" />
    </div>

    <div>
      <label class="block text-sm font-medium text-zinc-300 mb-2" for="email">E-mail</label>
      <input type="email" placeholder="dev@rocketseat.com" formControlName="email"
        class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-3 text-zinc-200 placeholder-zinc-600 focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500 transition-colors" />
    </div>

    <div>
      <label class="block text-sm font-medium text-zinc-300 mb-2" for="age">Idade</label>
      <input type="number" placeholder="25" formControlName="age"
        class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-3 text-zinc-200 placeholder-zinc-600 focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500 transition-colors" />
    </div>

    <div class="col-span-1 md:col-span-2">
      <label class="block text-sm font-medium text-zinc-300 mb-2" for="address">Endereço</label>
      <input type="text" placeholder="Rua, Número, Bairro" formControlName="address"
        class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-3 text-zinc-200 placeholder-zinc-600 focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500 transition-colors" />
    </div>

    <div>
      <label class="block text-sm font-medium text-zinc-300 mb-2" for="state">Estado</label>
      <div class="relative">
        <select formControlName="state" appInputValidation errorMessage="O campo Estado é obrigatório"
          class="w-full appearance-none bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-3 text-zinc-200 focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500 transition-colors cursor-pointer">
          <option disabled selected>Selecione</option>
          @for (state of statesList(); track state.name) {
          <option [value]="state.name">{{ state.name }}</option>
          }
        </select>
        <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-zinc-500">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m6 9 6 6 6-6" />
          </svg>
        </div>
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-zinc-300 mb-2" for="city">Cidade</label>
      <div class="relative">
        <select formControlName="city" appInputValidation errorMessage="O campo Cidade é obrigatório"
          class="w-full appearance-none bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-3 text-zinc-200 focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500 transition-colors cursor-pointer">
          <option disabled selected>Selecione</option>
          @for (city of citiesList(); track city) {
          <option [value]="city">{{ city }}</option>
          }
        </select>
        <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-zinc-500">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m6 9 6 6 6-6" />
          </svg>
        </div>
      </div>
    </div>
  </div>

  <div>
    <label class="block text-sm font-medium text-zinc-300 mb-3" for="maritalStatus">Estado Civil</label>
    <div class="grid grid-cols-3 gap-3">
      <label class="cursor-pointer group">
        <input type="radio" name="maritalStatus" class="peer sr-only" formControlName="maritalStatus"
          value="Solteiro(a)" />
        <div
          class="border border-zinc-800 bg-zinc-950 rounded-lg p-3 text-center text-sm text-zinc-400 peer-checked:border-violet-500 peer-checked:bg-violet-500/10 peer-checked:text-violet-300 transition-all group-hover:border-zinc-700">
          Solteiro(a)
        </div>
      </label>
      <label class="cursor-pointer group">
        <input type="radio" name="maritalStatus" class="peer sr-only" formControlName="maritalStatus"
          value="Casado(a)" />
        <div
          class="border border-zinc-800 bg-zinc-950 rounded-lg p-3 text-center text-sm text-zinc-400 peer-checked:border-violet-500 peer-checked:bg-violet-500/10 peer-checked:text-violet-300 transition-all group-hover:border-zinc-700">
          Casado(a)
        </div>
      </label>
      <label class="cursor-pointer group">
        <input type="radio" name="maritalStatus" class="peer sr-only" formControlName="maritalStatus"
          value="Divorciado(a)" />
        <div
          class="border border-zinc-800 bg-zinc-950 rounded-lg p-3 text-center text-sm text-zinc-400 peer-checked:border-violet-500 peer-checked:bg-violet-500/10 peer-checked:text-violet-300 transition-all group-hover:border-zinc-700">
          Divorciado(a)
        </div>
      </label>
    </div>
  </div>

  <div class="flex justify-end pt-6 border-t border-zinc-800 mt-4">
    <button type="submit"
      class="bg-violet-600 hover:bg-violet-500 text-white px-6 py-3 rounded-lg font-bold text-sm tracking-wide transition-all flex items-center gap-2 shadow-lg shadow-violet-600/20 hover:shadow-violet-600/40 cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed disabled:shadow-none">
      PRÓXIMO PASSO
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14" />
        <path d="m12 5 7 7-7 7" />
      </svg>
    </button>
  </div>
</form>
